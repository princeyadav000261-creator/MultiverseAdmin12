<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiverse Books - Premium Admin Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-body: #050505;
            --bg-card: linear-gradient(145deg, rgba(30, 30, 35, 0.7), rgba(15, 15, 18, 0.8));
            --bg-input: rgba(0, 0, 0, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent-primary: #8b5cf6; 
            --accent-success: #10b981; 
            --accent-danger: #ef4444; 
            --accent-info: #3b82f6; 
            --accent-purple: #8b5cf6; 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body, button, input, select, textarea { font-weight: 700; }

        body { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100vw; height: 100svh; background-color: var(--bg-body); background-image: radial-gradient(circle at top right, #1a1a1f 0%, #000000 70%); color: var(--text-primary); display: flex; flex-direction: column; overflow: hidden; }
        body::before { content: ''; position: absolute; width: 600px; height: 600px; background: #ffffff; border-radius: 50%; filter: blur(250px); opacity: 0.02; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 0; pointer-events: none; }

        /* Loader & Auth */
        #initLoader { position: fixed; inset: 0; z-index: 999999; background: #000000; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .loader-logo { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; border: 4px solid #71717a; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0.2); } 70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(255,255,255,0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255,255,255,0); } }

        #authScreen { position: fixed; inset: 0; z-index: 99999; background: linear-gradient(135deg, rgba(15, 15, 25, 0.7) 0%, rgba(0, 0, 0, 0.9) 100%); display: none; flex-direction: column; justify-content: center; align-items: center; }
        .login-wrapper { position: relative; z-index: 10; width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .logo-container { text-align: center; margin-bottom: 25px; width: 100%; }
        .brand-logo { width: 115px; height: 115px; border-radius: 22px; object-fit: cover; margin-bottom: 20px; border: 6px solid #71717a; box-shadow: 0 15px 40px rgba(0,0,0,0.9); transition: transform 0.3s ease; }
        .brand-title { font-size: 35px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; text-shadow: 0 4px 15px rgba(0,0,0,0.8); margin-top: 10px; color: #fff;}
        .brand-subtitle { font-size: 10px; letter-spacing: 1px; color: #71717a; margin-top: 10px; text-transform: uppercase; font-weight: 900; white-space: nowrap; width: 100%; }
        
        .glass-card { background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%); backdrop-filter: blur(16px); border-radius: 16px; padding: 40px 30px; width: 100%; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); position: relative; overflow: hidden; }
        .form-header { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 22px; font-weight: 800; margin-bottom: 35px; color: #fff; letter-spacing: 1px; }
        .input-group { position: relative; margin-bottom: 25px; z-index: 1; }
        .input-group input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255, 255, 255, 0.4); border-radius: 0; color: #ffffff; font-size: 15px; padding: 10px 25px 10px 0; outline: none; transition: 0.3s ease; font-weight: 700;}
        .input-group input:focus { border-bottom-color: #00d2ff; }
        .toggle-password { position: absolute; right: 0; top: 50%; transform: translateY(-50%); color: #a1a1aa; cursor: pointer; transition: 0.2s; z-index: 2;}
        .btn-login { position: relative; z-index: 1; width: 100%; background: rgba(255, 255, 255, 0.95); color: #000000; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer; transition: all 0.3s ease; }
        .btn-login:hover { transform: translateY(-2px); background: #ffffff; box-shadow: 0 8px 20px rgba(255, 255, 255, 0.25); }

        /* App Layout */
        #appWrapper { display: none; width: 100%; height: 100%; flex-direction: column; position: relative; z-index: 1; }
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-color); flex-shrink: 0; z-index: 100; }
        .header-logo { width: 42px; height: 42px; border-radius: 12px; object-fit: cover; border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .header-title { font-size: 1.25rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: #ffffff; }
        .power-btn { width: 42px; height: 42px; border-radius: 50%; background: rgba(239, 68, 68, 0.05); border: 1px solid rgba(239, 68, 68, 0.3); color: #ef4444; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        
        .top-nav-tabs { display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto; white-space: nowrap; flex-shrink: 0; border-bottom: 1px solid var(--border-color); background: rgba(15, 15, 18, 0.5); z-index: 99;}
        .tab-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #a1a1aa; padding: 10px 18px; border-radius: 12px; font-size: 0.95rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .tab-btn.active { background: rgba(139, 92, 246, 0.1); border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.15); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; padding: 30px 20px; width: 100%; transform: translateZ(0); }
        .section-container { width: 100%; max-width: 1100px; display: none; margin: 0 auto; box-sizing: border-box; }
        .section-container.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms & Cards */
        .premium-form-card, .admin-card { background: var(--bg-card); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 30px; box-shadow: 0 20px 45px rgba(0,0,0,0.6); margin-bottom: 30px; width: 100%; }
        .premium-form-card { border-top: 1px solid rgba(139, 92, 246, 0.4); }
        .card-header, .card-header-large { font-weight: 800; color: #fff; padding-bottom: 15px; margin-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; font-size: 1.2rem;}
        
        .compact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px 20px; }
        .compact-grid .full-width { grid-column: 1 / -1; }
        .compact-group { display: flex; flex-direction: column; gap: 6px; }
        .compact-label { font-size: 0.85rem; font-weight: 800; color: #ffffff; text-transform: uppercase; margin-left: 2px;}
        .compact-input { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 16px; border-radius: 12px; color: #fff; font-weight: 700; width: 100%; outline: none;}
        .compact-input:focus { border-color: var(--accent-primary); }
        .btn-compact-submit { grid-column: 1 / -1; background: linear-gradient(135deg, var(--accent-primary), #6d5dfc); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 8px;}
        
        /* Tables */
        .table-responsive { overflow-x: auto; margin-top: 10px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); }
        .books-table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: left; }
        .books-table th { background: rgba(255,255,255,0.05); padding: 18px 25px; font-size: 0.9rem; font-weight: 800; color: #ffffff; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .books-table td { padding: 18px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 1.05rem; font-weight: 700; vertical-align: middle; }
        .action-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; font-size: 1rem; cursor: pointer; margin-right: 10px; padding: 8px 14px; color: #fff;}
        .btn-edit:hover { background: #3b82f6; color: #fff; border-color: #3b82f6;}
        .btn-delete:hover { background: var(--accent-danger); border-color: var(--accent-danger); }

        /* ==========================================
           FIXED PROMPTS UI (Professional Styling)
           ========================================== */
        .prompt-item-container { margin-bottom: 40px; }
        
        /* Title OUTSIDE Card */
        .prompt-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding: 0 5px; gap: 10px; }
        .prompt-main-title { font-size: 1.25rem; color: #ffffff; font-weight: 900; line-height: 1.4; word-break: break-word; margin: 0; letter-spacing: 0.5px;}
        
        /* Edit/Delete Icons */
        .prompt-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .btn-icon { width: 36px; height: 36px; border-radius: 10px; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1rem; transition: 0.3s; }
        .btn-icon.edit-icon { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-icon.edit-icon:hover { background: #3b82f6; color: #fff; }
        .btn-icon.delete-icon { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-icon.delete-icon:hover { background: #ef4444; color: #fff; }
        
        /* Modern Card Structure */
        .prompt-card-modern { 
            background: linear-gradient(to bottom, rgba(25, 25, 30, 0.95), rgba(15, 15, 18, 0.98)); 
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        
        /* Instruction INSIDE Card */
        .prompt-instruction { 
            padding: 18px 22px; 
            color: #e4e4e7; 
            font-size: 1rem; 
            font-weight: 700; 
            line-height: 1.6; 
            background: rgba(139, 92, 246, 0.1); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent-primary);
        }
        .prompt-instruction i { color: var(--accent-primary); margin-right: 8px; }

        /* Main Text Fixed (No Monospace, Professional Font) */
        .prompt-text { 
            padding: 22px; 
            color: #f4f4f5; 
            font-size: 1.05rem; 
            background: rgba(0, 0, 0, 0.5); 
            word-break: break-word; 
            white-space: pre-wrap; 
            font-weight: 500; /* Regular readable font */
            font-family: inherit; /* Uses Outfit font */
            line-height: 1.7;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .prompt-copy-btn { 
            width: 100%; background: rgba(255, 255, 255, 0.03); color: #fff; border: none; padding: 16px; 
            font-weight: 800; font-size: 1rem; text-transform: uppercase; letter-spacing: 1.5px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; 
        }
        .prompt-copy-btn:hover { background: rgba(139, 92, 246, 0.2); color: var(--accent-primary); }
        /* ========================================== */

        /* Users & Charts */
        .user-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 18px; }
        .stat-card h4 { color: #a1a1aa; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card h2 { color: #fff; font-size: 1.8rem; font-weight: 900; }
        
        .sys-info-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 0.85rem; font-weight: 600; color: #d4d4d8; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.1); }
        
        #toast { position: fixed; top: 25px; right: 25px; background: #ffffff; color: #000; padding: 18px 30px; border-radius: 14px; font-size: 1.1rem; font-weight: 800; transform: translateX(150%); transition: 0.4s; z-index: 9999999; display: flex; align-items: center; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #toast.show { transform: translateX(0); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 2000; display: none; justify-content: center; align-items: center; opacity: 0; padding: 20px; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--bg-card); width: 100%; max-width: 800px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); max-height: 90svh; overflow-y: auto; padding: 30px; position: relative;}
        .close-modal { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="toast"><i class="fas fa-info-circle"></i> <span id="toastMsg">Action Successful!</span></div>

    <div id="initLoader"><img src="https://i.postimg.cc/cJdGqYHG/IMG-20260524-WA0004.jpg" class="loader-logo"></div>

    <div id="authScreen">
        <div class="login-wrapper">
            <div class="logo-container">
                <img src="https://i.postimg.cc/cJdGqYHG/IMG-20260524-WA0004.jpg" class="brand-logo">
                <h1 class="brand-title">VAULT CORE</h1>
                <p class="brand-subtitle">System Control | Data Management</p>
            </div>
            <div class="glass-card">
                <h2 class="form-header"><i class="fas fa-shield-halved"></i> Admin Login</h2>
                <form id="loginForm">
                    <div class="input-group"><input type="email" id="loginEmail" placeholder="Admin Email" required></div>
                    <div class="input-group">
                        <input type="password" id="loginPassword" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                    <button type="submit" id="submitBtn" class="btn-login">Verify Access</button>
                </form>
            </div>
        </div>
    </div>

    <div id="appWrapper">
        <header class="app-header">
            <img src="https://i.postimg.cc/cJdGqYHG/IMG-20260524-WA0004.jpg" class="header-logo">
            <h1 class="header-title">VAULT PANEL</h1>
            <button class="power-btn" id="headerLogoutBtn"><i class="fas fa-power-off"></i></button>
        </header>

        <nav class="top-nav-tabs">
            <button class="tab-btn active" onclick="switchTab('manage')"><i class="fas fa-layer-group"></i> Manage Books</button>
            <button class="tab-btn" id="navPrompts" onclick="switchTab('prompts')"><i class="fas fa-terminal"></i> AI Prompts</button>
            <button class="tab-btn" id="navUsers" onclick="switchTab('users')"><i class="fas fa-users-cog"></i> Users Info</button>
        </nav>

        <main class="main-content">
            <!-- Manage Books -->
            <div id="sectionManage" class="section-container active">
                <div class="admin-card">
                    <div class="card-header"><i class="fas fa-list"></i> Vault Inventory</div>
                    <div class="table-responsive">
                        <table class="books-table">
                            <thead><tr><th>Book Info</th><th>Actions</th></tr></thead>
                            <tbody id="booksTableBody"><tr><td colspan="2" style="text-align:center;">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- PROMPTS SECTION (UI FIXED) -->
            <div id="sectionPrompts" class="section-container">
                <div class="premium-form-card" style="margin-bottom: 40px;">
                    <div class="card-header"><i class="fas fa-plus-circle"></i> Add New Prompt</div>
                    <div class="compact-grid">
                        <div class="compact-group full-width"><label class="compact-label">Short Title (Outside Card)</label><input type="text" id="newPromptTitle" class="compact-input" placeholder="e.g. 1. 💡 How to use ?"></div>
                        <div class="compact-group full-width"><label class="compact-label">Instruction Text (Inside Card)</label><textarea id="newPromptInstruction" class="compact-input" placeholder="e.g. Bas is prompt ko copy karein..." rows="2"></textarea></div>
                        <div class="compact-group full-width"><label class="compact-label">Main Prompt (To be Copied)</label><textarea id="newPromptText" class="compact-input" placeholder="Role: Act as an expert..." rows="3"></textarea></div>
                        <button class="btn-compact-submit" onclick="addPrompt(this)"><i class="fas fa-save"></i> Save Prompt</button>
                    </div>
                </div>
                <div id="promptsContainer"><div style="text-align:center; color:#a1a1aa;">Loading prompts...</div></div>
            </div>

            <!-- USERS SECTION (DEVICE & BROWSER ADDED) -->
            <div id="sectionUsers" class="section-container">
                <div class="admin-card">
                    <div class="card-header"><i class="fas fa-users-shield"></i> User Activity & System Info</div>
                    <div class="table-responsive">
                        <table class="books-table">
                            <thead><tr><th>Profile</th><th>User Details</th><th>System Info</th><th>Status</th></tr></thead>
                            <tbody id="usersTableBody"><tr><td colspan="4" style="text-align:center;">Loading users...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Prompt Modal -->
    <div class="modal-overlay" id="editPromptModal">
        <div class="modal-content">
            <i class="fas fa-times close-modal" onclick="closeModal('editPromptModal')"></i>
            <div class="card-header"><i class="fas fa-pen"></i> Edit Prompt</div>
            <form id="editPromptForm" class="compact-grid">
                <input type="hidden" id="editPromptId"> 
                <div class="compact-group full-width"><label class="compact-label">Short Title</label><input type="text" id="edPromptTitle" class="compact-input" required></div>
                <div class="compact-group full-width"><label class="compact-label">Instruction Text</label><textarea id="edPromptInstruction" class="compact-input" rows="2"></textarea></div>
                <div class="compact-group full-width"><label class="compact-label">Main Prompt</label><textarea id="edPromptText" class="compact-input" required rows="4"></textarea></div>
                <button type="submit" class="btn-compact-submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.section-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('section' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function togglePassword() {
            const p = document.getElementById('loginPassword');
            p.type = p.type === 'password' ? 'text' : 'password';
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function showToast(msg, type='success') {
            const t = document.getElementById('toast'); 
            t.style.background = type === 'error' ? '#ef4444' : '#10b981';
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }
        window.copyText = function(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            showToast("Copied Successfully!");
        }

        // Detect Browser & Device
        function getDeviceInfo() {
            let ua = navigator.userAgent;
            if(/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle|Opera M(obi|ini)/.test(ua)) return "Mobile Device";
            return "Desktop / PC";
        }
        function getBrowserInfo() {
            let ua = navigator.userAgent;
            if(ua.includes("Chrome") && !ua.includes("Edg")) return "Google Chrome";
            if(ua.includes("Safari") && !ua.includes("Chrome")) return "Apple Safari";
            if(ua.includes("Firefox")) return "Mozilla Firefox";
            if(ua.includes("Edg")) return "Microsoft Edge";
            return "Other Browser";
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const app = initializeApp({
            apiKey: "AIzaSyASYcouPGDMx5_V9ZUZ3RcFifCxcbpcst8",
            authDomain: "spidy-book-dbe32.firebaseapp.com",
            projectId: "spidy-book-dbe32"
        });
        const db = getFirestore(app); const auth = getAuth(app);
        
        let dbPrompts = []; let dbUsers = [];

        onAuthStateChanged(auth, async (user) => {
            document.getElementById('initLoader').style.display = 'none';
            if (user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('appWrapper').style.display = 'flex';
                
                // Track Admin's Device & Browser in Firestore
                try {
                    await updateDoc(doc(db, "users", user.uid), {
                        device: getDeviceInfo(),
                        browser: getBrowserInfo(),
                        lastLogin: new Date().toLocaleString()
                    });
                } catch(e) { console.log("Device update skipped for SuperAdmin"); }

                loadData();
            } else {
                document.getElementById('appWrapper').style.display = 'none';
                document.getElementById('authScreen').style.display = 'flex';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try { await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value); } 
            catch(err) { showToast("Invalid Credentials", "error"); }
        });
        document.getElementById('headerLogoutBtn').onclick = () => signOut(auth);

        function loadData() {
            // Prompts Realtime Sync (Fixed Layout applied here)
            onSnapshot(query(collection(db, "prompts"), orderBy("createdAt", "asc")), (snapshot) => {
                dbPrompts = []; const container = document.getElementById('promptsContainer'); container.innerHTML = '';
                snapshot.forEach(doc => {
                    const d = doc.data(); d.id = doc.id; dbPrompts.push(d);
                    const safeText = d.text.replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
                    
                    // Layout Fix applied
                    let instructionHTML = d.instruction ? `<div class="prompt-instruction"><i class="fas fa-info-circle"></i> ${d.instruction.replace(/\n/g, "<br>")}</div>` : "";
                    
                    container.innerHTML += `
                    <div class="prompt-item-container">
                        <!-- Title OUTSIDE -->
                        <div class="prompt-item-header">
                            <h3 class="prompt-main-title">${d.title}</h3> 
                            <div class="prompt-actions">
                                <button class="btn-icon edit-icon" onclick="window.openEditPrompt('${d.id}')"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon delete-icon" onclick="window.deleteData('prompts','${d.id}')"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <!-- Modern Card INSIDE -->
                        <div class="prompt-card-modern">
                            ${instructionHTML}
                            <div class="prompt-text" id="pt_${d.id}">${safeText}</div>
                            <button class="prompt-copy-btn" onclick="copyText('pt_${d.id}')"><i class="far fa-copy"></i> Copy Prompt</button>
                        </div>
                    </div>`;
                });
            });

            // Users Realtime Sync (Device & Browser Added)
            onSnapshot(collection(db, "users"), (snapshot) => {
                const tbody = document.getElementById('usersTableBody'); tbody.innerHTML = '';
                snapshot.forEach(doc => {
                    const u = doc.data();
                    let device = u.device || "Unknown Device";
                    let browser = u.browser || "Unknown Browser";
                    
                    tbody.innerHTML += `
                    <tr>
                        <td><img src="${u.photo || 'https://via.placeholder.com/45'}" style="width:45px;border-radius:50%;"></td>
                        <td><strong style="color:#fff;">${u.name || 'Admin'}</strong><br><span style="font-size:0.8rem;color:#a1a1aa;">${u.email}</span></td>
                        <td>
                            <span class="sys-info-badge"><i class="fas fa-mobile-alt"></i> ${device}</span><br>
                            <span class="sys-info-badge"><i class="fab fa-chrome"></i> ${browser}</span>
                        </td>
                        <td><span style="color:#10b981; font-weight:800;"><i class="fas fa-check-circle"></i> Active</span></td>
                    </tr>`;
                });
            });
        }

        window.addPrompt = async (btn) => {
            const title = document.getElementById('newPromptTitle').value; 
            const ins = document.getElementById('newPromptInstruction').value; 
            const text = document.getElementById('newPromptText').value;
            if(!title || !text) return showToast("Title & Text Required", "error");
            btn.innerHTML = "Saving...";
            await addDoc(collection(db, "prompts"), { title, instruction: ins, text, createdAt: Date.now() });
            showToast("Saved!"); btn.innerHTML = `<i class="fas fa-save"></i> Save Prompt`;
            document.querySelectorAll('#sectionPrompts input, #sectionPrompts textarea').forEach(e=>e.value='');
        }

        window.openEditPrompt = (id) => {
            const p = dbPrompts.find(x => x.id === id);
            document.getElementById('editPromptId').value = p.id;
            document.getElementById('edPromptTitle').value = p.title;
            document.getElementById('edPromptInstruction').value = p.instruction || '';
            document.getElementById('edPromptText').value = p.text;
            document.getElementById('editPromptModal').classList.add('active');
        }

        document.getElementById('editPromptForm').onsubmit = async (e) => {
            e.preventDefault(); const id = document.getElementById('editPromptId').value;
            await updateDoc(doc(db, "prompts", id), {
                title: document.getElementById('edPromptTitle').value,
                instruction: document.getElementById('edPromptInstruction').value,
                text: document.getElementById('edPromptText').value
            });
            closeModal('editPromptModal'); showToast("Updated!");
        }

        window.deleteData = async (col, id) => {
            if(confirm("Are you sure you want to delete this?")) {
                await deleteDoc(doc(db, col, id)); showToast("Deleted successfully!");
            }
        }
    </script>
</body>
</html>
